{% extends "base.html" %}
{% block title %}Print Registered — Print Tracker{% endblock %}
{% block content %}
<section class="panel kiosk-compact">
    <h2 class="success-heading">You're All Set</h2>
    <p class="status-line success">Your label is printing now.</p>

    <p class="muted-line">Print ID: {{ job.label_code }} &middot; {{ job.file_name }}</p>

    <div class="form-actions success-cta">
        <a class="button-primary-link" href="{{ url_for('patron.register') }}">
            Register Another Print <span id="successCountdown"></span>
        </a>
    </div>
</section>

<script>
    (() => {
        const targetUrl = "{{ url_for('patron.register') }}";
        const countdownEl = document.getElementById("successCountdown");
        let seconds = 10;
        const tick = () => {
            if (countdownEl) {
                countdownEl.textContent = `(${seconds}s)`;
            }
            if (seconds <= 0) {
                window.location.assign(targetUrl);
                return;
            }
            seconds -= 1;
            setTimeout(tick, 1000);
        };
        tick();
    })();
</script>
{% endblock %}
