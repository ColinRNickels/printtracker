{% extends "base.html" %}
{% block title %}Staff Login — Print Tracker{% endblock %}
{% block content %}
<section class="panel auth-panel">
    <h2>Staff Access</h2>
    <p>Enter the staff password to continue.</p>
    <form method="post" class="stacked-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="next" value="{{ next_url }}">
        <label>
            Password
            <input name="password" type="password" autofocus autocomplete="current-password" required>
        </label>
        <div class="form-actions">
            <button type="submit">Unlock Staff Page</button>
        </div>
    </form>
</section>
{% endblock %}
